<div class="modal-header">
  <h5 class="modal-title">{{ isEdit ? 'Modifier' : 'Ajouter' }} Détail</h5>
  <button type="button" class="btn-close" (click)="onCancel()"></button>
</div>

<form [formGroup]="form">
  <div class="modal-body">
    <!-- Messages -->
    <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="alert alert-success" role="alert">
      {{ successMessage }}
    </div>

    <!-- Formulaire simplifié: ref + quantité + prix (champs clés) -->
    <div class="mb-3">
      <label class="form-label">Référence *</label>
      <input 
        type="text" 
        class="form-control" 
        formControlName="reference"
        [class.is-invalid]="form.get('reference')?.invalid && form.get('reference')?.touched"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Quantité *</label>
      <input 
        type="number" 
        class="form-control" 
        formControlName="quantite"
        [class.is-invalid]="form.get('quantite')?.invalid && form.get('quantite')?.touched"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Prix Unitaire HT</label>
      <input 
        type="number" 
        step="0.01"
        class="form-control" 
        formControlName="prixUnitaireHT"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea 
        class="form-control" 
        rows="2"
        formControlName="description"
      ></textarea>
    </div>
  </div>
</form>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading">
    Annuler
  </button>
  <button 
    type="button" 
    class="btn btn-primary" 
    (click)="onSave()"
    [disabled]="form.invalid || isLoading"
  >
    <span *ngIf="!isLoading">{{ isEdit ? 'Mettre à jour' : 'Créer' }}</span>
    <span *ngIf="isLoading">
      <span class="spinner-border spinner-border-sm me-2"></span>
      En cours...
    </span>
  </button>
</div>
