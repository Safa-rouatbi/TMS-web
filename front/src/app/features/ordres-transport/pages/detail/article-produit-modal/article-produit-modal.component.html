<div class="modal-header">
  <h5 class="modal-title">{{ isEdit ? 'Modifier' : 'Ajouter' }} Article Produit</h5>
  <button type="button" class="btn-close" (click)="onCancel()"></button>
</div>

<form [formGroup]="form">
  <div class="modal-body">
    <!-- Messages -->
    <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="alert alert-success" role="alert">
      {{ successMessage }}
    </div>

    <!-- Formulaire simplifié: referenceArticle + quantité + typePalette + poidsTotal -->
    <div class="mb-3">
      <label class="form-label">Référence Article *</label>
      <input 
        type="text" 
        class="form-control" 
        formControlName="referenceArticle"
        [class.is-invalid]="form.get('referenceArticle')?.invalid && form.get('referenceArticle')?.touched"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Quantité *</label>
      <input 
        type="number" 
        class="form-control" 
        formControlName="qte"
        [class.is-invalid]="form.get('qte')?.invalid && form.get('qte')?.touched"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Type Palette</label>
      <input 
        type="text" 
        class="form-control" 
        formControlName="typePalette"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Poids Palette Total (kg)</label>
      <input 
        type="number" 
        step="0.01"
        class="form-control" 
        formControlName="poidsPaletteTotal"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Gerbable?</label>
      <div class="form-check">
        <input 
          type="checkbox" 
          class="form-check-input" 
          id="gerbable"
          formControlName="gerbable"
        />
        <label class="form-check-label" for="gerbable">
          Oui, ce produit est gerbable
        </label>
      </div>
    </div>
  </div>
</form>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading">
    Annuler
  </button>
  <button 
    type="button" 
    class="btn btn-primary" 
    (click)="onSave()"
    [disabled]="form.invalid || isLoading"
  >
    <span *ngIf="!isLoading">{{ isEdit ? 'Mettre à jour' : 'Créer' }}</span>
    <span *ngIf="isLoading">
      <span class="spinner-border spinner-border-sm me-2"></span>
      En cours...
    </span>
  </button>
</div>
