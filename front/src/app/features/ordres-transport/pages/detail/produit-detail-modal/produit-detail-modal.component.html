<div class="modal-header">
  <h5 class="modal-title">{{ isEdit ? 'Modifier' : 'Ajouter' }} Produit Détail</h5>
  <button type="button" class="btn-close" (click)="onCancel()"></button>
</div>

<form [formGroup]="form">
  <div class="modal-body">
    <!-- Messages -->
    <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="alert alert-success" role="alert">
      {{ successMessage }}
    </div>

    <!-- Formulaire simplifié: typeRessource + ressource + paysEnlevement + paysLivraison + poidsTotal + prixAchat -->
    <div class="mb-3">
      <label class="form-label">Type Ressource</label>
      <input 
        type="text" 
        class="form-control" 
        formControlName="typeRessource"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Ressource</label>
      <input 
        type="text" 
        class="form-control" 
        formControlName="ressource"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Pays Enlèvement</label>
      <input 
        type="text" 
        class="form-control" 
        formControlName="paysEnlevement"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Pays Livraison</label>
      <input 
        type="text" 
        class="form-control" 
        formControlName="paysLivraison"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Poids Total (kg)</label>
      <input 
        type="number" 
        step="0.01"
        class="form-control" 
        formControlName="poidsTotal"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Prix Achat</label>
      <input 
        type="number" 
        step="0.01"
        class="form-control" 
        formControlName="prixAchat"
      />
    </div>
  </div>
</form>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading">
    Annuler
  </button>
  <button 
    type="button" 
    class="btn btn-primary" 
    (click)="onSave()"
    [disabled]="isLoading"
  >
    <span *ngIf="!isLoading">{{ isEdit ? 'Mettre à jour' : 'Créer' }}</span>
    <span *ngIf="isLoading">
      <span class="spinner-border spinner-border-sm me-2"></span>
      En cours...
    </span>
  </button>
</div>
